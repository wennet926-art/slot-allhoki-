<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 LIVE CHAT - ALL HOKI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh;}
        .pesan-saya {background: #165DFF; color: white; margin-left: auto; border-radius: 15px 15px 0 15px;}
        .pesan-lain {background: #E5E6EB; color: #1D2129; margin-right: auto; border-radius: 15px 15px 15px 0;}
        .area-chat {height: 70vh; overflow-y: auto;}
    </style>
</head>
<body class="text-white">

    <div class="container mx-auto px-4 py-4 max-w-2xl">
        <!-- HEADER CHAT -->
        <div class="bg-black/60 rounded-t-2xl p-4 border-b border-yellow-500 flex justify-between items-center">
            <a href="index.html" class="text-yellow-400 text-xl"><i class="fa fa-arrow-left"></i></a>
            <h1 class="text-xl font-bold text-yellow-400 flex items-center gap-2">
                <i class="fa fa-comments"></i> LIVE CHAT ANGGOTA
            </h1>
            <div></div> <!-- Kosong buat penengah -->
        </div>

        <!-- AREA TAMPILAN PESAN -->
        <div id="wadahPesan" class="area-chat bg-white/95 text-black p-4 space-y-3">
            <!-- PESAN AKAN MUNCUL DI SINI -->
            <p class="text-center text-gray-500 text-sm">📢 Selamat datang di Live Chat All Hoki</p>
        </div>

        <!-- KETIK PESAN -->
        <div class="bg-black/60 rounded-b-2xl p-4 border-t border-yellow-500 flex gap-2">
            <input type="text" id="inputPesan" placeholder="Ketik pesan Anda..." 
                class="flex-1 px-4 py-3 rounded-lg bg-white/10 border border-yellow-500/50 focus:outline-none focus:border-yellow-400 text-white">
            <button id="tombolKirim" class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-5 py-3 rounded-lg transition">
                <i class="fa fa-paper-plane"></i> KIRIM
            </button>
        </div>
    </div>

    <script src="akun.js"></script>
    <script>
        cekLogin(); // Wajib login dulu baru bisa chat
        const namaUser = localStorage.getItem('nama');
// Kalau admin, tampilkan nama khusus
if(cekAdmin()) {
    document.title = "👑 CHAT ADMIN - ALL HOKI";
}

        const wadah = document.getElementById('wadahPesan');
        const input = document.getElementById('inputPesan');

        // === TAMPILKAN SEMUA PESAN ===
        function tampilkanPesan(){
            wadah.innerHTML = ''; // Kosongkan dulu
            const daftar = ambilPesanChat();

            daftar.forEach(p => {
                const elemen = document.createElement('div');
                elemen.classList.add('p-3', 'max-w-[80%]', 'shadow');

                // Cek apakah ini pesan saya atau orang lain
                if(p.nama === namaUser){
                    elemen.classList.add('pesan-saya');
                } else {
                    elemen.classList.add('pesan-lain');
                }

                elemen.innerHTML = `
                    <p class="text-xs opacity-80 mb-1 font-bold">${p.nama} <span class="opacity-60">• ${p.jam}</span></p>
                    <p>${p.isi}</p>
                `;
                wadah.appendChild(elemen);
            });

            // Auto scroll ke paling bawah
            wadah.scrollTop = wadah.scrollHeight;
        }

        // === KIRIM PESAN ===
        function prosesKirim(){
            const teks = input.value.trim();
            if(teks === '') return;

            kirimPesanChat(teks);
            input.value = ''; // Kosongkan kolom ketik
            tampilkanPesan(); // Perbarui tampilan
        }

        // Klik tombol kirim
        document.getElementById('tombolKirim').addEventListener('click', prosesKirim);

        // Tekan tombol Enter buat kirim
        input.addEventListener('keypress', function(e){
            if(e.key === 'Enter') prosesKirim();
        });

        // PERBARUI OTOMATIS SETIAP 2 DETIK (Supaya pesan orang lain muncul)
        tampilkanPesan();
        setInterval(tampilkanPesan, 2000);
    </script>
</body>
</html>
