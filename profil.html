<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 PROFIL AKUN - ALL HOKI SLOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh;}
    </style>
</head>
<body class="text-white">

    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-yellow-400 flex items-center justify-center gap-2">
                <i class="fa fa-user-circle"></i> PROFIL ANDA
            </h1>
        </div>

        <!-- Info Akun -->
        <div class="bg-black/60 rounded-2xl p-6 shadow-2xl border-2 border-yellow-500 mb-6">
            <h2 class="text-xl font-bold mb-4 text-yellow-300">📋 DATA AKUN</h2>
            <div class="grid grid-cols-2 gap-3 text-sm">
                <p>Nama Lengkap</p><p class="font-bold" id="profilNama"></p>
                <p>Username</p><p class="font-bold" id="profilUser"></p>
                <p>Nomor HP</p><p class="font-bold" id="profilHp"></p>
                <p>Saldo Akun</p><p class="font-bold text-green-400" id="profilSaldo"></p>
            </div>
        </div>

        <!-- Riwayat Transaksi -->
        <div class="bg-black/60 rounded-2xl p-6 shadow-2xl border-2 border-blue-500">
            <h2 class="text-xl font-bold mb-4 text-blue-300">📑 RIWAYAT TRANSAKSI</h2>
            <div id="riwayatList" class="space-y-2 max-h-80 overflow-y-auto pr-2">
                <p class="text-gray-400 text-center">Belum ada riwayat</p>
            </div>
        </div>

        <!-- Tombol Aksi -->
        <div class="grid grid-cols-3 gap-3 mt-6">
            <a href="deposit.html" class="bg-green-600 py-3 rounded-lg text-center font-bold hover:scale-105">💎 Deposit</a>
            <a href="wd.html" class="bg-red-600 py-3 rounded-lg text-center font-bold hover:scale-105">💸 WD</a>
            <button onclick="keluarAkun()" class="bg-gray-700 py-3 rounded-lg font-bold hover:scale-105">🚪 Keluar</button>
        </div>

        <!-- Kembali -->
        <div class="text-center mt-4">
            <a href="index.html" class="text-yellow-400 hover:underline">← Kembali ke Permainan</a>
        </div>
    </div>

    <script src="akun.js"></script>
    <script>
        cekLogin();
        // Isi Data Profil
        document.getElementById('profilNama').innerText = localStorage.getItem('nama');
        document.getElementById('profilUser').innerText = localStorage.getItem('user');
        document.getElementById('profilHp').innerText = localStorage.getItem('hp');
        document.getElementById('profilSaldo').innerText = 'Rp ' + parseInt(ambilSaldo()).toLocaleString('id-ID');

        // Tampilkan Riwayat
        let riwayat = JSON.parse(localStorage.getItem('riwayatTransaksi') || '[]');
        let wadah = document.getElementById('riwayatList');
        if(riwayat.length > 0) wadah.innerHTML = '';

        riwayat.forEach(r => {
            let warna = r.jenis === 'DEPOSIT' ? 'text-green-400' : 'text-red-400';
            let tanda = r.jenis === 'DEPOSIT' ? '+' : '';
            wadah.innerHTML += `
            <div class="p-2 rounded bg-white/5 border border-white/10 flex justify-between items-center">
                <div>
                    <p class="font-bold">${r.jenis} • ${r.metode}</p>
                    <p class="text-xs text-gray-400">${r.waktu}</p>
                </div>
                <p class="font-bold ${warna}">${tanda}Rp ${Math.abs(r.nilai).toLocaleString('id-ID')}</p>
            </div>`;
        });
    </script>
</body>
</html>
