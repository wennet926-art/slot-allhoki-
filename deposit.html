<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 DEPOSIT - ALL HOKI SLOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh;}
    </style>
</head>
<body class="text-white">

    <div class="container mx-auto px-4 py-8 max-w-md">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-yellow-400 flex items-center justify-center gap-2">
                <i class="fa fa-credit-card"></i> ISI SALDO
            </h1>
            <p class="text-green-300">Saldo Saat Ini: Rp <span id="saldoUser">0</span></p>
        </div>

        <!-- Form Deposit -->
        <div class="bg-black/60 rounded-2xl p-6 shadow-2xl border-2 border-green-500">
            <form id="formDeposit">
                <!-- Pilih Metode -->
                <div class="mb-4">
                    <label class="block text-sm mb-2 text-green-300">Metode Pembayaran</label>
                    <select id="metode" class="w-full px-4 py-3 rounded-lg bg-white/10 border border-green-500/50 focus:outline-none focus:border-green-400" required>
                        <option value="">-- Pilih Metode --</option>
                        <option value="DANA">DANA</option>
                        <option value="OVO">OVO</option>
                        <option value="GOPAY">GOPAY</option>
                        <option value="SHOPEEPAY">SHOPEEPAY</option>
                        <option value="Transfer BCA">Transfer BCA</option>
                        <option value="Transfer BRI">Transfer BRI</option>
                    </select>
                </div>

                <!-- Nomor Tujuan -->
                <div class="mb-4 p-3 bg-green-900/30 rounded-lg border border-green-400/30">
                    <p class="text-sm text-green-200">📌 Nomor Tujuan:</p>
                    <p class="font-bold text-lg" id="noTujuan">0822-5419-8610 (ALL HOKI)</p>
                </div>

                <!-- Jumlah Uang -->
                <div class="mb-6">
                    <label class="block text-sm mb-2 text-green-300">Jumlah Deposit (Rp)</label>
                    <input type="number" id="jumlah" min="10000" placeholder="Minimal Rp 10.000" 
                        class="w-full px-4 py-3 rounded-lg bg-white/10 border border-green-500/50 focus:outline-none focus:border-green-400" required>
                </div>

                <!-- Keterangan -->
                <div class="mb-6">
                    <label class="block text-sm mb-2 text-green-300">Keterangan / Catatan</label>
                    <input type="text" id="keterangan" placeholder="Contoh: Deposit A/n Budi" 
                        class="w-full px-4 py-3 rounded-lg bg-white/10 border border-green-500/50 focus:outline-none focus:border-green-400">
                </div>

                <!-- Tombol Kirim -->
                <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 py-3 rounded-lg font-bold text-lg hover:scale-[1.02] transition shadow-lg">
                    ✅ KIRIM PERMINTAAN
                </button>
            </form>
        </div>

        <!-- Tombol Kembali -->
        <div class="text-center mt-6">
            <a href="index.html" class="text-yellow-400 hover:underline">← Kembali ke Permainan</a>
        </div>
    </div>

    <script src="akun.js"></script>
    <script>
        cekLogin();
        document.getElementById('saldoUser').innerText = parseInt(ambilSaldo()).toLocaleString('id-ID');

        document.getElementById('formDeposit').addEventListener('submit', function(e){
            e.preventDefault();
            const jumlah = parseInt(document.getElementById('jumlah').value);
            const metode = document.getElementById('metode').value;
            const ket = document.getElementById('keterangan').value || 'Deposit';

            // Tambah Saldo Otomatis (Sistem)
            let saldoSekarang = parseInt(ambilSaldo());
            let saldoBaru = saldoSekarang + jumlah;
            ubahSaldo(saldoBaru);

            // Simpan ke Riwayat
            simpanRiwayat('DEPOSIT', jumlah, metode);

            alert(`✅ Berhasil!\nRp ${jumlah.toLocaleString()} sudah masuk.\nSaldo baru: Rp ${saldoBaru.toLocaleString()}`);
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
